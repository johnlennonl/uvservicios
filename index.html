<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV Servicios | Portal de Acceso Corporativo</title>
    <meta name="description" content="Portal corporativo de UV Servicios para acceso seguro al monitoreo inteligente, gestion de pozos y analisis operativo BES.">
    <link rel="icon" type="image/png" href="img/uvservicioslogo.png">
    <!-- Fuentes base de la interfaz -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <!-- Loader inicial mientras arranca la pantalla de acceso -->
    <div id="premium-loader" class="premium-loader-overlay">
        <img src="img/uvservicioslogo.png" alt="Cargando..." class="loader-logo-pulse" width="150" height="109">
    </div>

    <div class="split-container">
        <!-- Columna izquierda: acceso y autenticacion -->
        <main class="form-section">
            <div class="form-content-wrapper">
                <header class="login-header">
                    <img src="img/UV-SERVICES-Logo-vectorial-sin-fondo.webp" alt="UV Servicios" class="brand-logo" width="155" height="155">
                    <h1>Monitoreo Inteligente</h1>
                    <p>Ingrese sus credenciales corporativas para la gestión de pozos.</p>
                </header>

                <form id="login-form" class="login-form">
                    <div id="error-container" class="error-box hidden">
                        <p id="error-message"></p>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" required autocomplete="email"
                                placeholder="usuario@uvservicios.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper password-group">
                            <input type="password" id="password" required autocomplete="current-password"
                                placeholder="••••••••">
                            <button type="button" id="toggle-password" class="btn-toggle-eye"
                                title="Mostrar/Ocultar contraseña">
                                <!-- Icono de ojo abierto -->
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <!-- Icono de ojo cerrado -->
                                <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-submit">
                        <span class="btn-text">Iniciar Sesión</span>
                        <div class="loader-container">
                            <svg viewBox="0 0 64 48" class="pumpjack-svg">
                                <!-- Base estructural -->
                                <path d="M22 44 L42 44 M32 44 L32 18 M26 44 L32 18 L38 44" fill="none" stroke="white"
                                    stroke-width="2" stroke-linecap="round" />

                                <!-- Mecanismo trasero del balancin -->
                                <g class="crank-engine">
                                    <circle cx="12" cy="38" r="6" fill="none" stroke="white" stroke-width="1"
                                        stroke-dasharray="2,2" opacity="0.2" />
                                    <g class="crank-arm">
                                        <rect x="10" y="32" width="4" height="12" rx="2" fill="white" />
                                        <circle cx="12" cy="38" r="1.5" fill="#0F172A" />
                                    </g>
                                </g>

                                <!-- Ensamblaje de la viga movil -->
                                <g class="pump-beam">
                                    <!-- Viga principal -->
                                    <path d="M8 16 L52 16 L52 20 L8 20 Z" fill="white" />
                                    <!-- Cabezal del balancin -->
                                    <path d="M52 14 L58 14 C63 14 64 20 64 34 C64 35 62 35 61 34 L52 20 Z"
                                        fill="white" />
                                    <!-- Varilla de extraccion -->
                                    <line x1="62" y1="34" x2="62" y2="46" stroke="white" stroke-width="1.2"
                                        stroke-dasharray="1,1" />
                                    <!-- Biela de conexion -->
                                    <line x1="12" y1="20" x2="12" y2="34" stroke="white" stroke-width="2"
                                        stroke-linecap="round" />
                                    <!-- Punto de pivote central -->
                                    <circle cx="32" cy="18" r="2.8" fill="#0F172A" />
                                </g>
                            </svg>
                        </div>
                    </button>
                </form>

                <footer class="login-footer">
                    <p>© 2026 Unión Venezuela Servicios C.A.<br>Seguridad y Confianza en el Campo.</p>
                </footer>
            </div>
        </main>

        <!-- Columna derecha: fondo visual y ambientacion -->
        <aside class="image-section">
            <div class="image-overlay"></div>
            <!-- Fondo animado de telemetria -->
            <canvas id="telemetry-bg"></canvas>
            
            <!-- Pie historico del fondo -->
            <div class="image-caption">
                <div class="caption-content">
                    <span class="caption-tag">MONUMENTO HISTÓRICO</span>
                    <h2 class="caption-title">ZUMAQUE 1 • MG-1</h2>
                    <p class="caption-text">Descubrimiento del Campo Mene Grande • Julio 1914</p>
                    <div class="caption-brand">PDVSA | PATRIMONIO DE LA NACIÓN</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scripts del acceso -->
    <script type="module" src="js/bg-animation.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
